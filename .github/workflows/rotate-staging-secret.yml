name: Rotate staging secret

# One-shot operator workflow for setting/rotating Fly app secrets on
# `kassa-api-staging`. Triggered manually on a hot incident — KASA-201
# (`SESSION_COOKIE_SECRET` was never provisioned, web machines crash on
# boot, /health unreachable).
#
# Why a workflow and not a manual `fly secrets set`:
#   - The Fly token lives in the GitHub `production` environment. Driving
#     rotations through GH gives an audit trail (who triggered, when, what
#     job log) and avoids a human having to hold the token locally.
#   - The secret value is generated inside the runner and never echoed.
#     Fly persists the secret; this workflow does not.
#
# Scope:
#   - Staging only (`kassa-api-staging`). Production rotations go via a
#     follow-up workflow once `kassa-api-prod` is wired (KASA-70 landed
#     the deploy path; rotation parity follows in a separate ticket).
#   - One secret per dispatch. Pick the name from the dropdown.
#
# After this runs:
#   - Fly automatically rolls the web machines onto the new secret value
#     (`fly secrets set` triggers a redeploy unless `--stage` is passed).
#   - The job tails `flyctl status` until at least one web machine is in
#     `started` state, then curls /health to confirm.
#   - Re-run the failed CD pipeline (Actions → CD → re-run) afterwards so
#     the smoke-tests job goes green on the next attempt.

on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: "Fly app secret to set on kassa-api-staging."
        required: true
        type: choice
        options:
          - SESSION_COOKIE_SECRET

concurrency:
  group: rotate-staging-secret-${{ github.event.inputs.secret_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rotate:
    name: Set ${{ github.event.inputs.secret_name }} on kassa-api-staging
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://kassa-api-staging.fly.dev
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      SECRET_NAME: ${{ github.event.inputs.secret_name }}
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
        with:
          version: 0.4.39

      - name: Generate and set secret on kassa-api-staging
        run: |
          set -euo pipefail
          # 64-char hex string (32 bytes). Comfortably above the Zod
          # min(32) gate in apps/api/src/config.ts.
          VALUE="$(openssl rand -hex 32)"
          # Mask the value before any potential print surface. flyctl
          # itself echoes only "Setting <NAME>" — never the value — but
          # masking is belt-and-braces.
          echo "::add-mask::${VALUE}"
          # `flyctl secrets set` triggers a rolling redeploy by default,
          # picking up the new value on every machine. No --stage here.
          flyctl secrets set --app kassa-api-staging "${SECRET_NAME}=${VALUE}"

      - name: Wait for web machines to settle
        run: |
          set -euo pipefail
          # Poll `flyctl status` until at least one `web` machine reports
          # `started`. The redeploy from `secrets set` is rolling, so
          # this is the canonical readiness signal before we hit /health.
          for attempt in {1..30}; do
            if flyctl status --app kassa-api-staging --json \
              | jq -e '[.Machines[]? | select(.config.metadata.fly_process_group == "web") | .state] | any(. == "started")' \
              > /dev/null 2>&1
            then
              echo "::notice::At least one web machine reached started state."
              exit 0
            fi
            echo "Attempt ${attempt}: no started web machine yet, sleeping 10s..."
            sleep 10
          done
          echo "::error::No web machine reached started state in 5 minutes."
          flyctl status --app kassa-api-staging || true
          exit 1

      - name: Verify /health
        run: |
          set -euo pipefail
          # Cold-start envelope is ~30s on staging. Mirror the CD smoke
          # job's tolerance: 5 attempts × 6s delay × 10s timeout per try.
          for attempt in {1..5}; do
            if curl -fsS --max-time 10 https://kassa-api-staging.fly.dev/health \
              | jq -e '.status == "ok"' > /dev/null
            then
              echo "::notice::/health returned status=ok on attempt ${attempt}."
              exit 0
            fi
            echo "Attempt ${attempt}: /health not ok yet, sleeping 6s..."
            sleep 6
          done
          echo "::error::/health did not return status=ok after 5 attempts."
          exit 1
