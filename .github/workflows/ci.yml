name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: install → lint → build → typecheck → test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Postgres service container backs the API integration suite (KASA-28) and
    # the fresh-DB migrate test (KASA-21). Without these env vars set both
    # suites skip cleanly via their `runIf*` gates; with them, every endpoint
    # covered by the integration suite round-trips through real SQL.
    #
    # `KASA_INTEGRATION_DATABASE_URL` is the dedicated gate for KASA-28's
    # truncate-between-tests harness — keeping it separate from `DATABASE_URL`
    # makes it impossible for a developer to accidentally TRUNCATE their app DB
    # by exporting `DATABASE_URL` and running `pnpm test`.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kassa
          POSTGRES_PASSWORD: kassa
          POSTGRES_DB: kassa_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kassa -d kassa_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://kassa:kassa@localhost:5432/kassa_test
      DATABASE_SSL: "false"
      KASA_INTEGRATION_DATABASE_URL: postgres://kassa:kassa@localhost:5432/kassa_test
      KASA_INTEGRATION_DATABASE_SSL: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint --reporter=github

      # Build before typecheck: workspace packages export types only from dist/.
      - name: Build workspace
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      # Deployable artifacts. Uploaded on every CI run so reviewers can inspect a
      # PR's compiled output and CD (future ticket) can consume the main-branch
      # artifact without rebuilding. api-dist bundles the workspace packages
      # apps/api imports at runtime (@kassa/payments, @kassa/schemas).
      - name: Upload POS PWA artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: pos-dist
          path: apps/pos/dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload Back Office artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: back-office-dist
          path: apps/back-office/dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload API artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: api-dist
          path: |
            apps/api/dist
            apps/api/package.json
            apps/api/Dockerfile
            apps/api/fly.toml
            apps/api/fly.prod.toml
            packages/payments/dist
            packages/payments/package.json
            packages/schemas/dist
            packages/schemas/package.json
            package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
          if-no-files-found: error
          retention-days: 7

  # KASA-68 vision-metric gate: full-day offline acceptance suite.
  #
  # Runs the Playwright spec at apps/pos/e2e/full-day-offline.spec.ts against
  # an in-memory API harness + the production POS bundle. Two browser
  # contexts simulate the two devices; the suite proves a merchant can ring
  # up 50 sales offline (mix of cash + QRIS-static, including BOM-parents,
  # plus 3 voids and 2 refunds) and reconcile EOD with zero cash variance
  # at both outlets.
  #
  # Posture is *informational on PR* and *blocking on push to main* per
  # docs/TECH-STACK.md §9 — keep PR CI fast, gate the trunk. Flake quarantine
  # is not permitted; any failure is a P0.
  acceptance-full-day-offline:
    name: Acceptance — full-day offline (KASA-68)
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    # Informational on PRs, blocking on main. continue-on-error short-circuits
    # the failure → red-cross signal on PR while keeping the workflow green;
    # on push the same step runs without that flag and trips the merge gate.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The harness imports the api package's compiled `buildApp` plus the
      # in-memory repos via the `exports` map in apps/api/package.json. A
      # workspace build before Playwright runs ensures `apps/api/dist/*` is
      # populated.
      - name: Build workspace
        run: pnpm -r build

      - name: Install Playwright browsers
        run: pnpm --filter @kassa/pos exec playwright install --with-deps chromium

      - name: Run full-day offline acceptance suite
        run: pnpm --filter @kassa/pos run test:e2e:full-day-offline
        env:
          CI: "true"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-full-day-offline-report
          path: |
            apps/pos/playwright-report
            apps/pos/test-results
          if-no-files-found: ignore
          retention-days: 14
