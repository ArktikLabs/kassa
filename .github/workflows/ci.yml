name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: install → lint → build → typecheck → test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint --reporter=github

      # Build before typecheck: workspace packages export types only from dist/.
      - name: Build workspace
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      # Deployable artifacts. Uploaded on every CI run so reviewers can inspect a
      # PR's compiled output and CD (future ticket) can consume the main-branch
      # artifact without rebuilding. api-dist bundles the workspace packages
      # apps/api imports at runtime (@kassa/payments, @kassa/schemas).
      - name: Upload POS PWA artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: pos-dist
          path: apps/pos/dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload Back Office artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: back-office-dist
          path: apps/back-office/dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload API artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: api-dist
          path: |
            apps/api/dist
            apps/api/package.json
            packages/payments/dist
            packages/payments/package.json
            packages/schemas/dist
            packages/schemas/package.json
            pnpm-lock.yaml
            pnpm-workspace.yaml
          if-no-files-found: error
          retention-days: 7
