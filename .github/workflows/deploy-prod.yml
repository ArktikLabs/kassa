name: Deploy Prod (API)

# Production deploy for the Kassa API — KASA-70.
#
# Sibling of cd.yml (which deploys POS/Back Office to Cloudflare Pages production
# and the API to Fly.io staging on every successful main-branch CI run). This
# workflow is the manual promotion gate for the API only:
#
#   - `workflow_dispatch` only. Operators pick the exact CI run id to promote.
#     There is no `workflow_run` trigger here — production never deploys
#     automatically on a green main.
#   - Preflight verifies the cited CI run is from `main`, succeeded overall,
#     AND its `acceptance-full-day-offline` job (KASA-68 vision-metric gate)
#     was green. A red acceptance job blocks promotion even if the rest of CI
#     passed.
#   - The `deploy-api-prod` job lives in the GitHub `production-prod`
#     environment, which carries the required-reviewer protection rule
#     (CEO + CTO). Approval pauses the run until a reviewer accepts, gives
#     the audit trail, and the env is the only place `FLY_API_TOKEN_PROD` /
#     `SENTRY_AUTH_TOKEN` exist.
#   - On deploy, Sentry source maps for `apps/api/dist` are uploaded against
#     the release `kassa-api@<sha12>` and the release is finalized. Static
#     surfaces (POS + Back Office) get the equivalent treatment in cd.yml on
#     the same SHA.
#   - Smoke tests run last via scripts/deploy-smoke.sh — same script, same
#     contract as staging, three production URLs.
#
# Enablement (one-time, by the board / ops):
#   1. Provision per the checklists in apps/api/fly.prod.toml header and
#      docs/RUNBOOK-DEPLOY.md §1 (Fly app, Neon prod branch, Redis prod,
#      Midtrans prod keys, Cloudflare custom domain on the static surfaces).
#   2. Create the GitHub `production-prod` environment with required-reviewer
#      rule including CEO and CTO. Add secrets:
#        FLY_API_TOKEN_PROD     (Fly token scoped to kassa-api-prod, Deploy)
#        SENTRY_AUTH_TOKEN      (Sentry internal integration with
#                                Releases: Admin scope on the Kassa org)
#   3. Set repository variables:
#        DEPLOY_PROD_ENABLED=true        (master switch; default false keeps inert)
#        SENTRY_ORG=<kassa-org-slug>     (e.g. "kassa")
#        SENTRY_PROJECT_API=<api-project-slug>  (e.g. "kassa-api")
# Until DEPLOY_PROD_ENABLED is flipped, preflight emits a notice and the
# deploy job is skipped — the workflow stays runnable but inert.

on:
  workflow_dispatch:
    inputs:
      ci_run_id:
        description: "CI run id (from main) whose api-dist artifact to promote. Find it under Actions → CI."
        required: true
        type: string

concurrency:
  # Serialize prod deploys: only one in-flight rollout at a time. Never cancel
  # an in-progress prod deploy — the rolling strategy + release_command must
  # finish or be explicitly rolled back, never half-killed.
  group: deploy-prod-api
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  preflight:
    name: Preflight (enablement + CI run verification)
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.gate.outputs.ready }}
      commit_sha: ${{ steps.verify.outputs.commit_sha }}
      short_sha: ${{ steps.verify.outputs.short_sha }}
    steps:
      - name: Check deploy enablement
        id: gate
        env:
          DEPLOY_PROD_ENABLED: ${{ vars.DEPLOY_PROD_ENABLED }}
        run: |
          if [ "${DEPLOY_PROD_ENABLED:-false}" != "true" ]; then
            echo "::notice title=Prod CD disabled::Set repository variable DEPLOY_PROD_ENABLED=true (and provision the production-prod environment + secrets) to activate. See .github/workflows/deploy-prod.yml header."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Independently re-verify the cited CI run before any deploy step. The
      # operator picks the run id; this gate makes sure they did not pick a
      # red run, a non-main run, or a run whose acceptance suite was red. The
      # GitHub branch protection on main is necessary but not sufficient — we
      # also block on the KASA-68 vision-metric gate.
      - name: Verify CI run is promotable
        id: verify
        if: steps.gate.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set -euo pipefail
          run_json=$(gh api "repos/$REPO/actions/runs/$CI_RUN_ID")
          head_branch=$(printf '%s' "$run_json" | jq -r .head_branch)
          conclusion=$(printf '%s' "$run_json" | jq -r .conclusion)
          workflow_name=$(printf '%s' "$run_json" | jq -r .name)
          head_sha=$(printf '%s' "$run_json" | jq -r .head_sha)

          if [ "$workflow_name" != "CI" ]; then
            echo "::error::Run $CI_RUN_ID belongs to workflow '$workflow_name', not 'CI'."
            exit 1
          fi
          if [ "$head_branch" != "main" ]; then
            echo "::error::Run $CI_RUN_ID is on branch '$head_branch', not 'main'."
            exit 1
          fi
          if [ "$conclusion" != "success" ]; then
            echo "::error::Run $CI_RUN_ID conclusion is '$conclusion', not 'success'."
            exit 1
          fi

          # KASA-68 vision-metric gate: the full-day-offline acceptance job
          # must have passed in this exact CI run. Reading per-job
          # conclusions is necessary because the parent run reports `success`
          # even when a `continue-on-error` job is red — we explicitly do
          # not want that semantic on prod promotion.
          accept_conclusion=$(gh api "repos/$REPO/actions/runs/$CI_RUN_ID/jobs" \
            --jq '.jobs[] | select(.name == "Acceptance — full-day offline (KASA-68)") | .conclusion')
          if [ "$accept_conclusion" != "success" ]; then
            echo "::error::Acceptance job (KASA-68) conclusion is '${accept_conclusion:-<missing>}', not 'success'. Fix the acceptance suite on a fresh main commit before promoting."
            exit 1
          fi

          short_sha="${head_sha:0:12}"
          echo "commit_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"
          echo "Promoting CI run $CI_RUN_ID at $head_sha (short=$short_sha)."

  deploy-api-prod:
    name: Deploy API → Fly.io production
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # required-reviewer gate (CEO + CTO) lives on the env, not in YAML.
    environment:
      name: production-prod
      url: https://kassa-api-prod.fly.dev
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PROD }}
    steps:
      # Checkout the composite action FIRST. It is repo-local under
      # .github/actions so the workflow needs the source tree on disk.
      # Sparse-checkout keeps the runner clean (we don't want apps/ here,
      # just the action def). Checkout MUST precede download-artifact:
      # actions/checkout with no `path:` targets $GITHUB_WORKSPACE, and
      # when the workspace contains files but no `.git` (the post-download
      # state) it deletes everything before the sparse checkout — which
      # would wipe the freshly-downloaded `api-image/` artifact.
      - name: Checkout (for composite action)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
          sparse-checkout: .github/actions/sentry-release
          sparse-checkout-cone-mode: false

      - name: Download api-dist from CI run
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: api-dist
          path: api-image
          run-id: ${{ inputs.ci_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # 1.5
        with:
          version: 0.4.39

      - name: Setup Node.js (for sentry-cli npx)
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "22"

      # Upload source maps BEFORE the deploy lands. If the upload fails we
      # still want the option to abort the deploy; a deployed-but-untraceable
      # release would mask exceptions on prod.
      - name: Sentry release — create + upload source maps
        uses: ./.github/actions/sentry-release
        with:
          release: kassa-api@${{ needs.preflight.outputs.short_sha }}
          commit-sha: ${{ needs.preflight.outputs.commit_sha }}
          dist-path: api-image/apps/api/dist
          repo: ${{ github.repository }}
          sentry-auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          sentry-org: ${{ vars.SENTRY_ORG }}
          sentry-project: ${{ vars.SENTRY_PROJECT_API }}
          # API bundle ships inside the Fly container and is never served
          # over public HTTP; the .map files stay so Node's
          # `--enable-source-maps` (set in apps/api/Dockerfile) symbolicates
          # stack traces in pino logs.
          strip-source-maps: "false"

      # Same shape as deploy-api-staging in cd.yml: artifact root is the
      # build context, --dockerfile points at the in-artifact Dockerfile,
      # --config picks the production fly file. --image-label tags with
      # `prod-<sha12>` so rollbacks can target a known-good image.
      - name: Deploy to Fly (kassa-api-prod)
        working-directory: api-image
        env:
          SHORT_SHA: ${{ needs.preflight.outputs.short_sha }}
        run: |
          set -euo pipefail
          flyctl deploy . \
            --app kassa-api-prod \
            --config apps/api/fly.prod.toml \
            --dockerfile apps/api/Dockerfile \
            --local-only \
            --image-label "prod-${SHORT_SHA}" \
            --env "KASSA_API_VERSION=prod-${SHORT_SHA}" \
            --strategy rolling \
            --wait-timeout 600

  smoke-tests:
    name: Smoke tests (production surfaces)
    needs: [preflight, deploy-api-prod]
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout (for scripts/deploy-smoke.sh)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.preflight.outputs.commit_sha }}
          sparse-checkout: scripts
          sparse-checkout-cone-mode: false

      # Cross-tier sanity: probe the API we just deployed AND the production
      # static surfaces on the URLs cd.yml already shipped them to. Catches
      # both "API deploy did not roll over" and "API works but PWA is stale".
      # Override --pos-url / --back-office-url here when custom domains land
      # (e.g. https://app.kassa.id).
      - name: Run post-deploy smoke tests
        env:
          SHORT_SHA: ${{ needs.preflight.outputs.short_sha }}
        run: |
          set -euo pipefail
          bash scripts/deploy-smoke.sh \
            --api-url https://kassa-api-prod.fly.dev \
            --pos-url https://kassa-pos.pages.dev \
            --back-office-url https://kassa-back-office.pages.dev \
            --expected-version "prod-${SHORT_SHA}" \
            --attempts 5 \
            --delay-seconds 6 \
            --timeout-seconds 10
