<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Kassa">
  <title>Kassa</title>
  <!--
    Canonical brand source for the **app icon** — PWA install, Android home-screen,
    iOS home-screen, and favicon. Distinct from the brand mark (kassa-mark.svg),
    which is the stroked geometric K used in lockups, product headers, and
    marketing surfaces.

    Why a separate glyph: at launcher sizes (192px and below on low-DPI Androids),
    the stroked mark's 60px line weight thins out and softens. The filled slab K
    holds shape down to favicon (32px) and reads as a confident silhouette under
    Android adaptive masks (circle/squircle/rounded square).

    Plate: rounded square, 17% corner radius (rx=88 on 512). Matches the iOS
    home-screen tile shape; Android adaptive masks crop the plate further.
    Color: #0D9488 (Kasir Teal — color.primary.600).

    Mark: filled slab K, white (#FFFFFF). Vertical bar x∈[160,212] width 52,
    height 280. Diagonals meet the bar in the waist region y∈[234,262]
    (midpoint 248 — optical centre, slightly above geometric centre 256, same
    balancing rule as the stroked mark).

    Re-exports:
      - apps/pos/public/icons/icon-512.svg        — same artwork, shipped at 512.
      - apps/pos/public/icons/icon-192.svg        — same artwork, scaled to 192,
                                                    with rx scaled to 32 (still 17%).
      - apps/pos/public/icons/icon-maskable-512.svg — full-bleed (no rx),
                                                    K offset for adaptive-mask
                                                    safe zone.
      - apps/pos/public/icons/icon-{192,512,maskable-512}.png — rasterized in CI.

    See docs/BRAND-IDENTITY.md §4.1 for the full app-icon spec and the
    mark-vs-app-icon variant rule.
  -->
  <rect width="512" height="512" rx="88" fill="#0D9488"/>
  <path d="M160 116h52v118l96-118h64l-108 128 118 152h-66L212 262v130h-52V116z" fill="#FFFFFF"/>
</svg>
